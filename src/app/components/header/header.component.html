<header class="header glass-panel">
  <div class="user-info">
    <div class="avatar">
      {{ (authService.getUser()?.email?.charAt(0) || 'U') | uppercase }}
    </div>
    <div class="user-details">
      <span class="user-email">{{ authService.getUser()?.email || 'Usuario' }}</span>
      <span class="user-role">{{ authService.getUser()?.role === 'admin' ? 'Administrador' : 'Diseñador' }}</span>
    </div>
  </div>
  
  <div class="actions">
    <button class="theme-toggle-header" (click)="themeService.toggleTheme()" [attr.title]="themeService.isDarkTheme() ? 'Cambiar a modo diurno' : 'Cambiar a modo nocturno'">
      <span *ngIf="themeService.isDarkTheme()">☀️</span>
      <span *ngIf="!themeService.isDarkTheme()">🌙</span>
    </button>
  </div>
</header>
